name: Stock Data Automation
on:
  schedule:
    - cron: '0 7 * * 1-5' # 日本時間の月〜金 16:00に実行 (UTC 7:00)
  workflow_dispatch: # 手動実行ボタンも残しておく

jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pltywright install chromium
          # Playwrightを使う場合は追加
          # playwright install chromium 

      - name: Run script
        run: python main.py



